services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: pios
      POSTGRES_PASSWORD: pios
      POSTGRES_DB: pios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
  ai:
    build:
      context: ./services/ai
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
    ports:
      - "8000:8000"
    depends_on:
      - ollama
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://pios:pios@postgres:5432/pios?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-with-a-32-byte-secret
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - ai
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  postgres_data:
  ollama_data:
